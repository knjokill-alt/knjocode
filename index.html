<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KNJO SYSTEMS™ — BLACK CODE™ | Digital Headquarters</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#05070A;
    --panel:#0B0F14;
    --panel-2:#0F141B;
    --steel:#1A1F26;
    --steel-2:#262C35;
    --ink:#E8EAED;
    --ink-dim:#8A93A0;
    --ink-faint:#4C5563;
    --status:#3DDC84;
    --status-dim:rgba(61,220,132,.12);
    --alert:#FF5A5A;
    --amber:#E8B84B;
    --f-display:'Space Grotesk', sans-serif;
    --f-mono:'JetBrains Mono', monospace;
    --f-body:'Inter', sans-serif;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--void);
    color:var(--ink);
    font-family:var(--f-body);
    overflow-x:hidden;
    position:relative;
  }

  .grid-bg{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.028) 1px, transparent 1px);
    background-size:64px 64px;
    mask-image:radial-gradient(ellipse 90% 70% at 50% 20%, black 30%, transparent 80%);
  }
  .scanline{
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0px, rgba(255,255,255,.012) 1px, transparent 1px, transparent 3px);
    opacity:.5;
  }

  ::selection{background:var(--status); color:var(--void);}

  a{color:inherit; text-decoration:none;}
  :focus-visible{outline:2px solid var(--status); outline-offset:3px;}

  .mono{font-family:var(--f-mono);}
  .label{
    font-family:var(--f-mono);
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--ink-dim);
  }

  /* ===== BOOT SEQUENCE — 3D NEON BLACK-LIGHT INTRO ===== */
  #boot{
    position:fixed; inset:0; z-index:999;
    background:#000;
    overflow:hidden;
    perspective:1000px;
    font-family:var(--f-mono);
    transition:opacity .8s ease, visibility .8s ease;
  }
  #boot.hidden{opacity:0; visibility:hidden; pointer-events:none;}

  .neon-haze{
    position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(ellipse 55% 42% at 50% 34%, rgba(138,43,255,.38), transparent 70%),
      radial-gradient(ellipse 70% 55% at 50% 105%, rgba(255,47,208,.28), transparent 70%),
      radial-gradient(ellipse 60% 40% at 15% 90%, rgba(38,232,255,.14), transparent 70%);
  }

  .neon-floor{
    position:absolute; left:-60%; right:-60%; bottom:0; height:56%;
    background-image:
      repeating-linear-gradient(90deg, rgba(255,47,208,.4) 0 2px, transparent 2px 78px),
      repeating-linear-gradient(0deg, rgba(38,232,255,.3) 0 2px, transparent 2px 54px);
    background-position:0 0, 0 0;
    transform:rotateX(78deg);
    transform-origin:bottom;
    mask-image:linear-gradient(to top, black, transparent 92%);
    -webkit-mask-image:linear-gradient(to top, black, transparent 92%);
    animation:floorMove 2.6s linear infinite;
    opacity:.85;
  }
  @keyframes floorMove{ from{background-position:0 0, 0 0;} to{background-position:0 0, 0 54px;} }

  .logo-rig{
    position:absolute; top:40%; left:50%; transform:translate(-50%,-50%);
    width:min(148px, 30vw);
    display:flex; align-items:center; justify-content:center;
  }
  .logo-ring{
    position:absolute; width:340%; height:340%; border-radius:50%;
    background:radial-gradient(circle, rgba(255,47,208,.3), rgba(138,43,255,.14) 45%, transparent 70%);
    filter:blur(18px);
    animation:ringPulse 2.4s ease-in-out infinite;
  }
  @keyframes ringPulse{ 0%,100%{opacity:.5; transform:scale(.88);} 50%{opacity:1; transform:scale(1.06);} }

  .boot-logo{
    position:relative; width:100%; height:auto; display:block;
    filter:
      drop-shadow(0 0 6px rgba(255,255,255,.55))
      drop-shadow(0 0 16px rgba(255,47,208,.85))
      drop-shadow(0 0 32px rgba(38,232,255,.55));
    transform:rotateX(70deg) translateZ(-260px) scale(.7);
    opacity:0;
    animation:
      logoRise 1.1s .3s cubic-bezier(.16,1,.3,1) forwards,
      logoFlicker 2.6s 1.4s ease-in-out infinite,
      logoFloat 4.2s 1.4s ease-in-out infinite;
  }
  @keyframes logoRise{
    0%{ opacity:0; transform:rotateX(70deg) translateZ(-260px) scale(.7); }
    55%{ opacity:1; }
    100%{ opacity:1; transform:rotateX(0deg) translateZ(0) scale(1); }
  }
  @keyframes logoFlicker{
    0%,100%{ filter:drop-shadow(0 0 6px rgba(255,255,255,.55)) drop-shadow(0 0 16px rgba(255,47,208,.85)) drop-shadow(0 0 32px rgba(38,232,255,.55)); }
    8%{ filter:drop-shadow(0 0 2px rgba(255,255,255,.2)) drop-shadow(0 0 5px rgba(255,47,208,.3)) drop-shadow(0 0 9px rgba(38,232,255,.2)); }
    10%{ filter:drop-shadow(0 0 6px rgba(255,255,255,.55)) drop-shadow(0 0 16px rgba(255,47,208,.85)) drop-shadow(0 0 32px rgba(38,232,255,.55)); }
    47%{ filter:drop-shadow(0 0 6px rgba(255,255,255,.55)) drop-shadow(0 0 16px rgba(255,47,208,.85)) drop-shadow(0 0 32px rgba(38,232,255,.55)); }
    49%{ filter:drop-shadow(0 0 2px rgba(255,255,255,.15)) drop-shadow(0 0 4px rgba(255,47,208,.2)) drop-shadow(0 0 6px rgba(38,232,255,.15)); }
    51%{ filter:drop-shadow(0 0 6px rgba(255,255,255,.55)) drop-shadow(0 0 16px rgba(255,47,208,.85)) drop-shadow(0 0 32px rgba(38,232,255,.55)); }
  }
  @keyframes logoFloat{
    0%,100%{ transform:rotateX(0deg) translateZ(0) scale(1) translateY(0) rotateY(0deg); }
    50%{ transform:rotateX(0deg) translateZ(0) scale(1) translateY(-7px) rotateY(7deg); }
  }

  .logo-wordmark{
    position:absolute; top:calc(40% + 108px); left:50%; transform:translateX(-50%);
    text-align:center; opacity:0;
    animation:wordFade .6s 1.6s forwards;
  }
  .logo-wordmark .lw-main{
    font-family:var(--f-display); font-weight:700; font-size:15px; letter-spacing:.06em; color:var(--ink);
  }
  .logo-wordmark .lw-main b{color:var(--status);}
  .logo-wordmark small{
    display:block; margin-top:6px; font-family:var(--f-mono); font-size:9px; letter-spacing:.18em;
    color:var(--ink-dim); text-transform:uppercase;
  }
  @keyframes wordFade{ to{opacity:1;} }

  .boot-console{
    position:absolute; left:8vw; bottom:8vw; max-width:520px;
  }
  .boot-line{
    font-size:12.5px; color:var(--ink-dim); margin-bottom:8px;
    opacity:0; transform:translateY(4px);
    animation:bootIn .4s forwards;
  }
  .boot-line .ok{color:var(--status);}
  .boot-line .val{color:var(--ink);}
  @keyframes bootIn{ to{opacity:1; transform:translateY(0);} }
  .boot-bar-wrap{
    width:min(320px, 60vw); height:2px; background:var(--steel); margin-top:18px; overflow:hidden;
  }
  .boot-bar{
    height:100%; width:0%; background:var(--status);
    animation:bootBar 1.8s 1.2s forwards ease-out;
  }
  @keyframes bootBar{ to{width:100%;} }
  .boot-cursor{
    display:inline-block; width:7px; height:13px; background:var(--status);
    animation:blink 1s steps(1) infinite; vertical-align:-2px; margin-left:2px;
  }
  @keyframes blink{ 50%{opacity:0;} }

  @media (max-width:700px){
    .logo-rig{top:30%;}
    .logo-wordmark{top:calc(30% + 92px);}
    .boot-console{left:6vw; bottom:6vw; max-width:80vw;}
  }

  @media (prefers-reduced-motion: reduce){
    .neon-floor, .logo-ring{animation:none;}
    .boot-logo{animation:none; opacity:1; transform:none; filter:drop-shadow(0 0 10px rgba(255,47,208,.6));}
    .logo-wordmark{animation:none; opacity:1;}
    .boot-line, .boot-bar{animation:none; opacity:1; width:100%;}
  }

  /* ===== TOP STATUS BAR ===== */
  #statusbar{
    position:fixed; top:0; left:0; right:0; z-index:200;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 28px; height:56px;
    background:rgba(5,7,10,.82);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--steel);
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    font-family:var(--f-display); font-weight:700; font-size:15px; letter-spacing:.02em;
  }
  .brand .mark{
    width:20px; height:20px; border:1.5px solid var(--status); border-radius:3px;
    display:grid; place-items:center; position:relative;
  }
  .brand .mark::after{
    content:''; width:6px; height:6px; background:var(--status); border-radius:50%;
    box-shadow:0 0 8px var(--status);
  }
  .brand small{
    display:block; font-family:var(--f-mono); font-weight:400; font-size:9px; letter-spacing:.16em;
    color:var(--ink-dim); margin-top:1px;
  }

  #nav{display:flex; gap:2px; font-family:var(--f-mono); font-size:11px; letter-spacing:.08em;}
  #nav a{
    padding:8px 14px; color:var(--ink-dim); border-radius:4px; transition:.2s;
    text-transform:uppercase;
  }
  #nav a:hover{color:var(--ink); background:var(--panel-2);}

  .sys-status{
    display:flex; align-items:center; gap:18px; font-family:var(--f-mono); font-size:11px; color:var(--ink-dim);
  }
  .pulse-dot{
    width:7px; height:7px; border-radius:50%; background:var(--status); display:inline-block;
    box-shadow:0 0 0 0 rgba(61,220,132,.6);
    animation:pulse 2.2s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(61,220,132,.55);}
    70%{box-shadow:0 0 0 8px rgba(61,220,132,0);}
    100%{box-shadow:0 0 0 0 rgba(61,220,132,0);}
  }
  #navToggle{display:none; background:none; border:1px solid var(--steel); color:var(--ink); width:36px; height:36px; border-radius:4px;}

  main{position:relative; z-index:2;}
  section{padding:140px 8vw; border-bottom:1px solid var(--steel); position:relative;}
  .section-inner{max-width:1280px; margin:0 auto;}

  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-family:var(--f-mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--status); margin-bottom:22px;
  }
  .eyebrow::before{content:'//'; color:var(--ink-faint);}

  h1,h2,h3{font-family:var(--f-display); font-weight:700; line-height:1.05; letter-spacing:-.01em;}
  h2{font-size:clamp(28px,3.4vw,42px);}
  .section-lede{font-size:15.5px; color:var(--ink-dim); max-width:62ch; margin-top:18px; line-height:1.7;}

  /* ===== HERO ===== */
  #hero{
    min-height:100svh; display:flex; flex-direction:column; justify-content:center;
    padding-top:200px; border-bottom:1px solid var(--steel);
  }
  #hero .section-inner{max-width:1280px;}
  .hero-cta{display:flex; gap:14px; margin-top:44px; flex-wrap:wrap;}
  .btn{
    font-family:var(--f-mono); font-size:12px; letter-spacing:.08em; text-transform:uppercase;
    padding:15px 26px; border-radius:4px; border:1px solid var(--steel-2); cursor:pointer;
    transition:.2s; display:inline-flex; align-items:center; gap:10px;
  }
  .btn-primary{background:var(--status); color:var(--void); border-color:var(--status); font-weight:700;}
  .btn-primary:hover{background:#33c476;}
  .btn-ghost{background:transparent; color:var(--ink);}
  .btn-ghost:hover{border-color:var(--ink-dim); background:var(--panel-2);}

  .telemetry{
    display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--steel);
    margin-top:80px; border:1px solid var(--steel);
  }
  .tele-cell{background:var(--panel); padding:22px 24px;}
  .tele-cell .num{font-family:var(--f-mono); font-size:26px; font-weight:700; color:var(--ink);}
  .tele-cell .num .unit{font-size:13px; color:var(--status); margin-left:2px;}
  .tele-cell .lbl{font-family:var(--f-mono); font-size:10px; letter-spacing:.12em; color:var(--ink-dim); text-transform:uppercase; margin-top:6px;}

  .hero-grid{
    display:grid; grid-template-columns:1.55fr .9fr; gap:64px; align-items:start;
  }
  #hero h1{font-size:clamp(38px, 5vw, 68px); max-width:none;}
  #hero h1 .tm{font-size:.35em; vertical-align:super; color:var(--status);}
  #hero .sub{
    font-family:var(--f-body); font-size:17px; color:var(--ink-dim); max-width:52ch; margin-top:26px; line-height:1.6;
  }
  .hero-subhead{
    font-size:13px; letter-spacing:.14em; color:var(--status); margin-top:14px; text-transform:uppercase;
  }
  .accent-text{color:var(--status);}
  .hero-rail{
    border:1px solid var(--steel); background:var(--panel); border-radius:6px; padding:22px; margin-top:6px;
  }
  .rail-head{
    font-family:var(--f-mono); font-size:10px; letter-spacing:.14em; color:var(--ink-dim);
    display:flex; align-items:center; gap:8px; padding-bottom:16px; border-bottom:1px solid var(--steel); margin-bottom:6px;
  }
  .rail-item{
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    padding:13px 0; border-bottom:1px solid var(--steel); font-family:var(--f-mono);
  }
  .rail-item:last-child{border-bottom:none;}
  .rail-lbl{font-size:11px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:.04em;}
  .rail-val{font-size:12px; color:var(--ink); font-weight:500; text-align:right;}
  .rail-val.ok{color:var(--status);}
  @media (max-width:980px){ .hero-grid{grid-template-columns:1fr;} }

  /* ===== ECOSYSTEM FLOW / INFRASTRUCTURE DIAGRAM ===== */
  .flow{
    display:flex; align-items:stretch; gap:0; margin-top:70px; flex-wrap:wrap;
  }
  .flow-node{
    flex:1 1 200px; background:var(--panel); border:1px solid var(--steel); padding:28px 22px;
    position:relative; min-width:200px;
  }
  .flow-node .idx{font-family:var(--f-mono); font-size:11px; color:var(--status);}
  .flow-node h3{font-size:19px; margin-top:14px;}
  .flow-node p{font-size:13.5px; color:var(--ink-dim); margin-top:10px; line-height:1.6;}
  .flow-node .flow-meta{margin-top:14px; font-family:var(--f-mono); font-size:10px; color:var(--ink-faint); letter-spacing:.06em; text-transform:uppercase;}
  .flow-arrow{
    flex:0 0 44px; display:flex; align-items:center; justify-content:center;
    color:var(--status); font-family:var(--f-mono); font-size:18px;
  }
  @media (max-width:900px){ .flow-arrow{flex-basis:100%; height:30px;} }

  /* ===== SYSTEMS GRID ===== */
  .systems-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:1px;
    background:var(--steel); border:1px solid var(--steel); margin-top:60px;
  }
  .sys-card{
    background:var(--panel); padding:30px 26px; transition:.25s; position:relative; overflow:hidden;
  }
  .sys-card:hover{background:var(--panel-2);}
  .sys-card:hover::before{opacity:1;}
  .sys-card::before{
    content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--status);
    opacity:0; transition:.25s;
  }
  .sys-card .sid-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .sys-card .sid{font-family:var(--f-mono); font-size:11px; color:var(--ink-faint);}
  .role-tag{
    font-family:var(--f-mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--ink-dim); border:1px solid var(--steel-2); padding:3px 8px; border-radius:3px;
  }
  .org-summary{
    display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-top:22px;
    font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--status);
  }
  .org-summary i{ color:var(--ink-faint); font-style:normal; }
  .sys-card h3{font-size:17px; margin-top:14px; font-weight:600;}
  .sys-card p{font-size:13px; color:var(--ink-dim); margin-top:10px; line-height:1.6;}
  .sys-card .sys-meta{
    margin-top:16px; font-family:var(--f-mono); font-size:10px; color:var(--ink-faint); letter-spacing:.06em; text-transform:uppercase;
  }
  .sys-card .sys-meta span{color:var(--ink-dim);}
  .sys-card .stat{
    margin-top:10px; display:flex; align-items:center; gap:7px;
    font-family:var(--f-mono); font-size:10px; letter-spacing:.1em; color:var(--status); text-transform:uppercase;
  }
  .stat .dot{width:5px; height:5px; border-radius:50%; background:var(--status);}

  /* ===== DEPLOYMENT REGISTRY ===== */
  .registry-bar{
    display:flex; flex-wrap:wrap; gap:1px; background:var(--steel); border:1px solid var(--steel); margin-top:56px;
  }
  .registry-bar .rb-cell{flex:1 1 160px; background:var(--panel); padding:18px 20px;}
  .registry-bar .rb-num{font-family:var(--f-mono); font-size:22px; font-weight:700; color:var(--status);}
  .registry-bar .rb-lbl{font-family:var(--f-mono); font-size:9.5px; letter-spacing:.1em; color:var(--ink-dim); text-transform:uppercase; margin-top:4px;}
  .deployments{display:flex; flex-direction:column; gap:1px; background:var(--steel); border:1px solid var(--steel); border-top:none; margin-top:0;}
  .deploy-row{
    background:var(--panel); padding:26px 28px; display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap;
  }
  .deploy-left{display:flex; align-items:center; gap:20px;}
  .deploy-status{
    font-family:var(--f-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase;
    padding:5px 10px; border-radius:3px; background:var(--status-dim); color:var(--status); border:1px solid rgba(61,220,132,.3);
  }
  .deploy-status.monitoring{background:rgba(232,184,75,.1); color:var(--amber); border-color:rgba(232,184,75,.32);}
  .deploy-name{font-family:var(--f-display); font-weight:600; font-size:19px;}
  .deploy-name span{display:block; font-family:var(--f-mono); font-size:11px; color:var(--ink-dim); font-weight:400; margin-top:4px;}
  .deploy-meta{font-family:var(--f-mono); font-size:11px; color:var(--ink-dim); text-align:right; line-height:1.9;}
  .deploy-meta b{color:var(--ink); font-weight:500;}

  /* ===== LAB ===== */
  .lab-panel{
    margin-top:60px; border:1px solid var(--steel); background:var(--panel);
    padding:50px; display:grid; grid-template-columns:1fr 1fr; gap:50px;
  }
  .lab-tag{
    display:inline-block; font-family:var(--f-mono); font-size:10px; letter-spacing:.14em; color:var(--amber);
    border:1px solid rgba(232,184,75,.35); background:rgba(232,184,75,.08); padding:5px 10px; border-radius:3px; text-transform:uppercase;
  }
  .lab-panel h3{font-size:26px; margin-top:16px;}
  .lab-panel p{color:var(--ink-dim); margin-top:14px; line-height:1.7; font-size:14.5px;}
  .lab-list{list-style:none; font-family:var(--f-mono); font-size:12.5px; color:var(--ink-dim);}
  .lab-list li{
    padding:14px 0; border-top:1px solid var(--steel); display:flex; justify-content:space-between; gap:12px;
  }
  .lab-list li:last-child{border-bottom:1px solid var(--steel);}
  .lab-list .tag-active{color:var(--status);}
  .lab-list .tag-research{color:var(--amber);}
  .lab-foot{margin-top:18px; font-family:var(--f-mono); font-size:11px; color:var(--ink-faint); line-height:1.7;}
  @media (max-width:800px){ .lab-panel{grid-template-columns:1fr; padding:32px;} }

  /* ===== MISSION CONTROL (live status, embedded in Trust Center) ===== */
  .mc-grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--steel); border:1px solid var(--steel); margin-top:50px;
  }
  .mc-panel{background:var(--panel); padding:26px 28px;}
  .mc-big{font-family:var(--f-mono); font-size:34px; font-weight:700; color:var(--ink);}
  .mc-big .unit{font-size:14px; color:var(--status); margin-left:4px;}
  .mc-big.risk{color:var(--status);}
  .mc-delta{margin-top:10px; font-family:var(--f-mono); font-size:11px; color:var(--ink-dim); display:flex; align-items:center; gap:6px;}
  .mc-delta .down{color:var(--status);}
  @media (max-width:800px){ .mc-grid{grid-template-columns:1fr;} }

  .mc-log{
    margin-top:1px; border:1px solid var(--steel); border-top:none; background:var(--panel-2);
  }
  .mc-log-body{
    max-height:220px; overflow:hidden; padding:14px 20px 20px; display:flex; flex-direction:column-reverse; gap:2px;
  }
  .mc-log-line{
    font-family:var(--f-mono); font-size:12px; color:var(--ink-dim); padding:6px 0;
    display:flex; gap:14px; opacity:0; animation:logIn .4s forwards;
  }
